<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      text-align: center;
      margin-bottom: 12px;
      color: #00d4ff;
    }
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }
    .status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #555;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .status-dot.active { background: #00e676; box-shadow: 0 0 6px #00e676; }
    .status-label { flex: 1; font-size: 13px; }
    .toggle-btn {
      background: #0f3460;
      color: #fff;
      border: 1px solid #00d4ff;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .toggle-btn:hover { background: #00d4ff; color: #1a1a2e; }
    .toggle-btn.stop { border-color: #ff5252; }
    .toggle-btn.stop:hover { background: #ff5252; }

    .section {
      background: #16213e;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .speed-row input[type=range] {
      flex: 1;
      accent-color: #00d4ff;
    }
    .speed-value {
      font-size: 15px;
      font-weight: bold;
      color: #00d4ff;
      min-width: 30px;
      text-align: right;
    }

    .gesture-info {
      font-size: 12px;
      line-height: 1.6;
    }
    .gesture-info .gesture {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .gesture .icon { font-size: 18px; }
    .gesture .label { color: #aaa; }
    .gesture .action { color: #00e676; font-weight: 600; }
    .gesture .action.down { color: #ff5252; }

    .current-gesture {
      text-align: center;
      font-size: 14px;
      padding: 8px;
      background: #0f3460;
      border-radius: 6px;
      margin-top: 6px;
    }
    .current-gesture .detected {
      font-weight: bold;
      color: #00e676;
    }

    .pdf-mode {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .pdf-mode label { font-size: 13px; }
    .switch {
      position: relative;
      width: 40px; height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #555;
      border-radius: 22px;
      cursor: pointer;
      transition: 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider { background: #00d4ff; }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>🤚 Gesture Scroll Control</h1>

  <!-- On/Off toggle -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">Stopped</span>
    <button class="toggle-btn" id="toggleBtn">Start</button>
  </div>

  <!-- Scroll speed -->
  <div class="section">
    <div class="section-title">Scroll Speed</div>
    <div class="speed-row">
      <input type="range" id="speedSlider" min="1" max="100" value="40">
      <span class="speed-value" id="speedValue">40</span>
    </div>
  </div>

  <!-- Cooldown -->
  <div class="section">
    <div class="section-title">Scroll Cooldown (ms)</div>
    <div class="speed-row">
      <input type="range" id="cooldownSlider" min="20" max="500" step="10" value="50">
      <span class="speed-value" id="cooldownValue">50</span>
    </div>
  </div>

  <!-- Auto PDF -->
  <div class="section">
    <div class="pdf-mode">
      <label>Auto-activate on PDF</label>
      <label class="switch">
        <input type="checkbox" id="pdfAutoToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Live gesture -->
  <div class="section">
    <div class="section-title">Current Gesture</div>
    <div class="current-gesture">
      <span id="gestureDisplay">—</span>
    </div>
  </div>

  <!-- Legend -->
  <div class="section">
    <div class="section-title">Gestures</div>
    <div class="gesture-info">
      <div class="gesture">
        <span class="icon">👆</span>
        <span class="label">7 sign (thumb + index) →</span>
        <span class="action">Scroll Up</span>
      </div>
      <div class="gesture">
        <span class="icon">🖐️</span>
        <span class="label">Open palm (all fingers) →</span>
        <span class="action down">Scroll Down</span>
      </div>
    </div>
  </div>

  <div class="footer">Press Start, then allow camera access</div>

  <script src="popup.js"></script>
</body>
</html>
